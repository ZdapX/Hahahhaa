<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCore Font | Copy Center</title>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MODAL PAGE (Muncul saat tombol ditekan) -->
    <div id="copy-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Salin Kode</h3>
            <div class="code-box">
                <textarea id="code-display" readonly></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-p" id="btn-final-copy">Salin Teks Sekarang</button>
                <button class="btn btn-close" onclick="tutupHalaman()">Kembali / Tutup</button>
            </div>
        </div>
    </div>

    <div id="toast">✅ Berhasil Disalin!</div>

    <nav>
        <div class="logo">DevCore<span>Font</span></div>
    </nav>

    <div class="container">
        <header>
            <h1>Typography Library</h1>
            <p>Pilih font dan dapatkan kodenya di halaman salin.</p>
        </header>
        <div id="font-grid" class="grid"></div>
    </div>

    <script>
        // 1. FUNGSI UNTUK MEMBUKA HALAMAN COPY
        function bukaHalamanCopy(teks, judul) {
            const modal = document.getElementById('copy-modal');
            const display = document.getElementById('code-display');
            const title = document.getElementById('modal-title');
            const btnCopy = document.getElementById('btn-final-copy');

            display.value = teks;
            title.innerText = "Copy " + judul;
            modal.classList.add('active');

            // Set fungsi tombol salin di dalam modal
            btnCopy.onclick = function() {
                // Proses Salin Manual yang paling ampuh
                display.select();
                display.setSelectionRange(0, 99999);
                document.execCommand('copy');
                
                // Munculkan notifikasi
                const t = document.getElementById("toast");
                t.className = "show";
                setTimeout(() => { 
                    t.className = ""; 
                    tutupHalaman(); // Tutup halaman otomatis setelah salin
                }, 1500);
            };
        }

        function tutupHalaman() {
            document.getElementById('copy-modal').classList.remove('active');
        }

        // 2. LOAD DATA FONT DARI BACKEND
        async function loadFonts() {
            const res = await fetch('/ambil-data-font');
            const fonts = await res.json();
            const grid = document.getElementById('font-grid');
            grid.innerHTML = '';

            fonts.forEach(f => {
                // Inject font preview
                const s = document.createElement('style');
                s.innerHTML = f.import;
                document.head.appendChild(s);

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h2 style="font-family: ${f.family}">${f.name}</h2>
                    <p class="preview" style="font-family: ${f.family}">The quick brown fox jumps over the lazy dog.</p>
                    <div class="actions">
                        <button class="btn btn-p" onclick="bukaHalamanCopy('${f.import}', 'Import Code')">Get @Import</button>
                        <button class="btn btn-s" onclick="bukaHalamanCopy('font-family: ${f.family};', 'CSS Family')">Get CSS</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        loadFonts();
    </script>
</body>
</html>
