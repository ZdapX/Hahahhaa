<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevCore Font | Fixed Edition</title>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast">✅ Teks Berhasil Disalin!</div>

    <nav>
        <div class="logo">DevCore<span>Font</span></div>
    </nav>

    <div class="container">
        <header>
            <h1>Typography Library</h1>
            <p>Jika klik tidak menyalin, tekan lama pada tombol untuk copy manual.</p>
        </header>
        
        <div id="font-grid" class="grid">
            <!-- Data Masuk Sini -->
        </div>
    </div>

    <!-- Hidden Input khusus untuk Mobile Fallback -->
    <input type="text" id="copy-engine" style="position: fixed; top: -1000px; left: -1000px;" readonly>

    <script>
        // FUNGSI UTAMA SALIN (NUKLIR VERSION)
        function salinTeks(teks) {
            // 1. Coba Cara Modern (Hanya jalan di HTTPS/Vercel)
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(teks).then(() => {
                    notifikasi();
                }).catch(() => {
                    caraManual(teks);
                });
            } else {
                // 2. Cara Manual (Untuk HP yang keras kepala)
                caraManual(teks);
            }
        }

        function caraManual(teks) {
            const input = document.getElementById('copy-engine');
            input.value = teks;
            input.select();
            input.setSelectionRange(0, 99999); // Untuk iOS

            try {
                const berhasil = document.execCommand('copy');
                if (berhasil) {
                    notifikasi();
                } else {
                    // JALUR TERAKHIR: Prompt Manual jika semua gagal
                    window.prompt("Gagal salin otomatis. Silakan salin teks di bawah ini:", teks);
                }
            } catch (err) {
                window.prompt("Copy manual:", teks);
            }
        }

        function notifikasi() {
            const t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 2500);
            
            // Berikan getaran pendek di HP (Hanya Android)
            if (navigator.vibrate) navigator.vibrate(50);
        }

        // LOAD DATA
        async function loadData() {
            const res = await fetch('/ambil-data-font');
            const fonts = await res.json();
            const grid = document.getElementById('font-grid');
            grid.innerHTML = '';

            fonts.forEach(f => {
                // Inject font preview
                const s = document.createElement('style');
                s.innerHTML = f.import;
                document.head.appendChild(s);

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h2 style="font-family: ${f.family}">${f.name}</h2>
                    <p class="preview" style="font-family: ${f.family}">The quick brown fox jumps over the lazy dog.</p>
                    <div class="actions">
                        <button class="btn btn-p" onclick="salinTeks('${f.import}')">@Import</button>
                        <button class="btn btn-s" onclick="salinTeks('font-family: ${f.family};')">CSS</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        loadData();
    </script>
</body>
</html>
